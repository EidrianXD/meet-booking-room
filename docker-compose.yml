# =============================================================================
# Orquestração local do sistema Distrimed (postgres + backend + frontend).
#
# Uso típico:
#   cp .env.example .env        # ajustar JWT_SECRET, DB_PASSWORD, etc.
#   docker compose up --build
#   # acessar http://localhost:${FRONTEND_PORT:-8080}
#
# O backend NÃO é exposto na host network — toda comunicação SPA → API passa
# pelo reverse proxy do Nginx do frontend (/api/* → backend:3000/). O Postgres
# também só conversa via network interna; nenhuma porta exposta no host
# (mantém a superfície de ataque mínima).
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: distrimed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-distrimed}
      POSTGRES_USER: ${POSTGRES_USER:-distrimed}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD no .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - distrimed-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-distrimed} -d ${POSTGRES_DB:-distrimed}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  backend:
    # `image` define a tag final, seja para builds locais (dev) seja para
    # pulls de imagens já pushadas pelo Jenkins (CI/CD). O default `dev`
    # casa com builds locais (`docker compose up --build`); no deploy via
    # Jenkins, BACKEND_TAG é setado para o commit SHA-7 da build.
    image: ghcr.io/eidrianxd/distrimed-backend:${BACKEND_TAG:-dev}
    build:
      context: ./backend
    container_name: distrimed-backend
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env}
      SEED_ON_BOOT: ${SEED_ON_BOOT:-false}
      DATABASE_URL: postgresql://${POSTGRES_USER:-distrimed}:${DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-distrimed}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - distrimed-net
    # O HEALTHCHECK herdado da imagem (Dockerfile) é respeitado pelo Compose
    # e usado pelo `depends_on: condition: service_healthy` do frontend abaixo.

  frontend:
    image: ghcr.io/eidrianxd/distrimed-frontend:${FRONTEND_TAG:-dev}
    build:
      context: ./frontend
      args:
        # Build-time: define a base da API no bundle. `/api` casa com o proxy
        # do Nginx (mesmo container). Sobrescreva apenas se for servir a SPA
        # em domínio separado do backend.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: distrimed-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - distrimed-net

volumes:
  # Volume sem `name:` explícito — derivado do project name. Assim dev
  # (`-p distrimed`) e prod (`-p distrimed-prod`) ficam isolados.
  postgres-data:

networks:
  # Network sem `name:` explícito pelo mesmo motivo do volume acima.
  distrimed-net:
    driver: bridge
